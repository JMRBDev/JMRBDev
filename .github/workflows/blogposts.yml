name: Update README Blog Posts

on:
  workflow_dispatch:
  schedule:
    - cron: "0 15 * * *"

permissions:
  contents: write

concurrency:
  group: update-readme-blog-posts
  cancel-in-progress: true

jobs:
  update-blog-posts:
    name: Update latest blog posts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Refresh README posts
        uses: ./.github/actions/rss-to-readme
        with:
          feed_url: https://www.joserosendo.dev/rss.xml
          count: 6

      - name: Commit README changes
        run: |
          if git diff --quiet README.md; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update README blog posts"
          git push
